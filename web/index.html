<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/dashboard/kai-mark.svg" />
    <link rel="alternate icon" type="image/png" href="/dashboard/favicon.png" />
    <title>KAI — Control Center</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/JetBrains/JetBrainsMono@master/web/css/jetbrains-mono.css"
    />
    <script>
      (function () {
        try {
          const t = localStorage.getItem("kai-theme");
          const dark = t ? t === "dark" : true;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
