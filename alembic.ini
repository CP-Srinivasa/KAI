[alembic]
script_location = app/storage/migrations
prepend_sys_path = .
version_path_separator = os
# Overridden by app/storage/migrations/env.py → DBSettings().url (reads DB_URL env var).
# This fallback is only used if alembic is invoked outside the app context.
sqlalchemy.url = postgresql+psycopg2://localhost:5432/ai_analyst_bot

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
