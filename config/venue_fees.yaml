# Venue-Tier-Fees fuer NEO-P-106 (V14, 90/10-Variante).
#
# Quelle: oeffentlich publizierte Spot-Trading-Fees der Venues (Stand 2026-04).
# Maker/Taker-Rate pro Venue (kein Volume-Tier).
# Begruendung: KAI ist Paper-Mode ohne reales Trade-Volume → Volume-Tier-
# Annahmen waeren Self-Reporting-Fiktion. Tier-1 (= keine Volumen-Reduktion)
# ist die ehrlichste Approximation.
# Rolle: Market-Orders = taker; Limit-Orders mit limit_price = maker. Ohne
# Orderbook-Sim ist das eine kontrollierte Naeherung, nicht Fill-Garantie.
#
# Aktualisierung: vierteljaehrlich pruefen (Binance updated VIP-Tiers
# typischerweise jedes Quartal). Bei Aktualisierung version + effective_from
# bumpen.

version: "1.1.0"
effective_from: "2026-04-01"
effective_until: "2026-09-30"  # forced re-check
source_note: "Public spot trading fees, taker rate, no VIP/volume discount applied"

# Sprint B (2026-06-01, CostModel): additive per-side bps fields + spread/
# slippage assumptions. The *_pct fields stay the legacy source-of-truth; the
# *_fee_bps_per_side fields are explicit derivations (pct * 100) so the CostModel
# reads bps directly. market_type defaults to "spot". expected_spread_bps and
# expected_slippage_bps are round-trip cost components consumed by the edge gate
# (Sprint D); 0 keeps the cost honest until measured forward (Sprint C).
venues:
  binance:
    market_type: "spot"
    taker_pct: 0.10
    maker_pct: 0.10
    taker_fee_bps_per_side: 10.0
    maker_fee_bps_per_side: 10.0
    expected_spread_bps: 0.0
    expected_slippage_bps: 0.0
    discount_flag: false
    source_url: "https://www.binance.com/en/fee/schedule"
  # Optional BNB-discount variant: taker/maker 7.5 bp/side. Activate by setting
  # paper.* below to these values (or point the engine venue to "binance_bnb").
  binance_bnb:
    market_type: "spot"
    taker_pct: 0.075
    maker_pct: 0.075
    taker_fee_bps_per_side: 7.5
    maker_fee_bps_per_side: 7.5
    expected_spread_bps: 0.0
    expected_slippage_bps: 0.0
    discount_flag: true
    source_url: "https://www.binance.com/en/fee/schedule"
  okx:
    market_type: "spot"
    taker_pct: 0.10
    maker_pct: 0.08
    taker_fee_bps_per_side: 10.0
    maker_fee_bps_per_side: 8.0
    expected_spread_bps: 0.0
    expected_slippage_bps: 0.0
    discount_flag: false
    source_url: "https://www.okx.com/fees"
  coinbase:
    market_type: "spot"
    taker_pct: 0.60
    maker_pct: 0.40
    taker_fee_bps_per_side: 60.0
    maker_fee_bps_per_side: 40.0
    expected_spread_bps: 0.0
    expected_slippage_bps: 0.0
    discount_flag: false
    source_url: "https://www.coinbase.com/advanced-trade/fees"
  bybit:
    market_type: "spot"
    taker_pct: 0.10
    maker_pct: 0.10
    taker_fee_bps_per_side: 10.0
    maker_fee_bps_per_side: 10.0
    expected_spread_bps: 0.0
    expected_slippage_bps: 0.0
    discount_flag: false
    source_url: "https://www.bybit.com/en/help-center/article/Trading-Fee-Structure"
  # paper-Venue: realistischer Default = Binance-Spot 10 bp/side (Operator-
  # Entscheidung 2026-06-01). NICHT mehr worst-case 60 bp. Das ist der
  # Normalbetrieb-Default fuer den paper-Engine und das Edge-Gate. Wer
  # konservativer rechnen will, setzt EXECUTION-Venue auf "coinbase".
  paper:
    market_type: "spot"
    taker_pct: 0.10
    maker_pct: 0.10
    taker_fee_bps_per_side: 10.0
    maker_fee_bps_per_side: 10.0
    expected_spread_bps: 0.0
    expected_slippage_bps: 0.0
    discount_flag: false
    source_url: "binance-spot-equivalent (realistic paper default)"
  # WP-C regime-edge-capture (2026-06-15): Maker-Kosten-Venue für die EV-Messung.
  # Befund: der broad Richtungs-Edge (~+12 bps brutto) trägt die ~20-bps-Taker-
  # Round-Trip nicht, eine ~4-bps-Maker-Round-Trip aber schon. Diese Venue
  # modelliert "wir zahlen durchgehend Maker" (Limit-Orders) — taker bewusst
  # ebenfalls auf die Maker-Rate gesetzt, da der CostModel-Default side=taker ist.
  # Reines Mess-Venue: `edge-report --venue paper_maker`. KEIN Default (paper
  # bleibt 10 bp/Seite); ändert kein Live-Verhalten. Live-Maker-Order-Routing ist
  # die separate Folge-Arbeit.
  paper_maker:
    market_type: "spot"
    taker_pct: 0.02
    maker_pct: 0.02
    taker_fee_bps_per_side: 2.0
    maker_fee_bps_per_side: 2.0
    expected_spread_bps: 0.0
    expected_slippage_bps: 0.0
    discount_flag: true
    source_url: "binance-spot maker tier (limit-order execution, measurement-only)"

# Default fuer GENUINELY UNKNOWN venues (kein YAML-Eintrag): worst-case ueber
# alle Venues. So underestimieren wir einen Venue, ueber den wir keine Daten
# haben, nie. ACHTUNG: das ist NICHT der paper-Default mehr — paper hat einen
# eigenen, realistischen Eintrag oben (10 bp). Diese Defaults greifen nur fuer
# echte Unbekannte (z.B. "kraken" ohne Eintrag).
default_taker_pct: 0.60
default_maker_pct: 0.60
