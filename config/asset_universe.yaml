# ─────────────────────────────────────────────────────────────────────────────
# KAI Asset-Universe Overlay
# ─────────────────────────────────────────────────────────────────────────────
# Adds the trading dimensions the watchlist (monitor/watchlists.yml) does NOT
# carry: trade horizon, sector, narrative, risk/liquidity/volatility tiers,
# tradability, data quality and correlation group.
#
# Contract (see app/trading/asset_universe.py):
#   * symbol keys are the canonical BASE asset (BTC, not BTC/USDT).
#   * Any field omitted for an asset falls back to `defaults` below.
#   * `defaults` deliberately uses "unknown" for the qualitative tiers so a
#     symbol that nobody curated is surfaced as NOT-evaluable instead of being
#     silently estimated. Fallbacks never invent a tier.
#   * tradable: true | false | unknown  (false = not tradable on the paper
#     crypto venue, e.g. equities/ETFs — kept as research-only context).
#
# Vocabularies (validated softly — unknown strings are accepted but flagged):
#   horizon            : short_term | mid_term | long_term_reserve | unknown
#   risk_tier          : low | medium | high | extreme | unknown
#   liquidity_tier     : very_low | low | medium | high | very_high | unknown
#   volatility_tier    : very_low | low | medium | high | very_high | unknown
#   data_quality       : low | medium | high | unknown
#
# This file is operator-curated config, NOT generated. It is intentionally
# small and explicit — extend it as the universe grows.

version: 1

defaults:
  horizon: unknown
  sector: unknown
  narrative: unknown
  risk_tier: unknown
  liquidity_tier: unknown
  volatility_tier: unknown
  data_quality: unknown
  tradable: unknown
  correlation_group: unknown

# Concentration limits for the SHORT-TERM trading sleeve (percent of short-term
# gross exposure). long_term_reserve positions are excluded from these caps —
# that is the whole point of the short/long separation. See DiversificationGuard.
limits:
  max_single_asset_pct: 25.0
  max_btc_eth_short_term_pct: 40.0
  max_sector_pct: 45.0
  max_narrative_pct: 45.0
  max_correlation_group_pct: 50.0
  max_exchange_pct: 100.0          # paper engine is single-venue; permissive on purpose
  max_stablecoin_quote_pct: 100.0  # all paper pairs quote in USDT today; permissive

