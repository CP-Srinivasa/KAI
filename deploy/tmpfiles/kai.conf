# systemd-tmpfiles config for KAI runtime directories.
#
# Ensures /home/kai/ai_analyst_trading_bot/logs exists with correct
# ownership BEFORE any kai-*.service starts. Fixes the chicken-and-egg
# problem observed during the 2026-05-07 Pi-5 cutover: systemd opens
# StandardOutput=append: ... BEFORE running ExecStartPre, so an
# `ExecStartPre=mkdir -p logs/` cannot help on a blank-slate host:
#   `Failed to set up standard output: No such file or directory`
#   `kai-server.service: control process exited, code=exited, status=209/STDOUT`
#
# systemd-tmpfiles-setup.service runs at boot and on `systemd-tmpfiles --create`,
# both BEFORE multi-user.target — so logs/ is guaranteed to exist when any
# kai-* unit is started.
#
# Install: copy to /etc/tmpfiles.d/kai.conf, run `systemd-tmpfiles --create kai.conf`.
# scripts/pi_install_systemd.sh handles this automatically.
#
# Format: Type Path Mode UID GID Age Argument
d /home/kai/ai_analyst_trading_bot/logs 0755 ubuntu ubuntu - -
