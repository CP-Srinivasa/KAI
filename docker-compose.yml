version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_analyst_bot}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./monitor:/app/monitor:ro
      - ./logs:/app/logs
    restart: unless-stopped
    networks: [botnet]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_analyst_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [botnet]

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    profiles: [dev]
    networks: [botnet]

volumes:
  postgres_data:

networks:
  botnet:
    driver: bridge
