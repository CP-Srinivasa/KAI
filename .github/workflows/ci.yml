name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kai_test
      APP_ENV: testing
      OPENAI_API_KEY: sk-test-key
      TELEGRAM_ENABLED: "false"
      EMAIL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --cov=app --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]" mypy
      - run: mypy app/ --ignore-missing-imports

  pr-check:
    name: PR Completeness Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check PR template fields filled
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 - <<'EOF'
          import os, sys
          body = os.environ.get("PR_BODY", "")
          required = [
              "Änderungsbericht",
              "Quality Gates",
              "Risiken",
              "Nächste TODOs",
              "Testbefehl",
          ]
          missing = [r for r in required if r not in body]
          if missing:
              print(f"❌ PR-Template unvollständig. Fehlende Abschnitte: {missing}")
              sys.exit(1)
          print("✅ PR-Template vollständig.")
          EOF
