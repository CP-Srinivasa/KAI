name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kai_test
      APP_ENV: testing
      OPENAI_API_KEY: sk-test-key
      TELEGRAM_ENABLED: "false"
      EMAIL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --cov=app --cov-report=xml
      - uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: false  # security failures MUST block the build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit bandit
      - name: Dependency vulnerability scan (pip-audit)
        run: pip install -e ".[dev]" && pip-audit
      - name: Static security analysis (bandit)
        run: |
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            --skip B101,B601 \
            --format txt
        # B101 = assert statements in tests (allowed)
        # B601 = shell injection in paramiko (not used here)

  hygiene:
    name: Repo Hygiene & Secret Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secrets in tracked files
        run: |
          echo "=== Checking for leaked secrets in tracked files ==="
          FAIL=0

          # Pattern-based secret detection in all tracked files
          PATTERNS=(
            'sk-proj-[A-Za-z0-9_-]{20,}'    # OpenAI keys
            'sk-[A-Za-z0-9]{40,}'            # OpenAI legacy keys
            'AIzaSy[A-Za-z0-9_-]{33}'        # Google API keys
            'pub_[a-f0-9]{20,}'              # NewsData.io keys
            'xoxb-[0-9]{10,}'               # Slack bot tokens
            'ghp_[A-Za-z0-9]{36}'            # GitHub PATs
            'AKIA[A-Z0-9]{16}'              # AWS access keys
          )

          for pat in "${PATTERNS[@]}"; do
            HITS=$(git grep -lP "$pat" -- ':!.github/workflows/ci.yml' 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              echo "FAIL: Pattern '$pat' found in: $HITS"
              FAIL=1
            fi
          done

          # Check no .env files are tracked (allow .env.example as template)
          ENV_FILES=$(git ls-files '.env' '.env.local' '.env.*.local' '.env.production' '.env.staging' 2>/dev/null || true)
          if [ -n "$ENV_FILES" ]; then
            echo "FAIL: .env files tracked in git: $ENV_FILES"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Secrets or .env files detected in repository!"
            exit 1
          fi
          echo "OK: No secrets found in tracked files."

      - name: Gitignore completeness
        run: |
          echo "=== Checking .gitignore covers required patterns ==="
          FAIL=0
          REQUIRED=(
            '.env'
            '*.db'
            'artifacts/'
            '__pycache__/'
            '.mypy_cache/'
            '.ruff_cache/'
            'data/'
            '*.key'
            '.coverage'
          )
          GITIGNORE=$(cat .gitignore 2>/dev/null || echo "")

          for pattern in "${REQUIRED[@]}"; do
            if ! echo "$GITIGNORE" | grep -qF "$pattern"; then
              echo "FAIL: .gitignore missing required pattern: $pattern"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo "::error::.gitignore is incomplete — required patterns missing!"
            exit 1
          fi
          echo "OK: .gitignore covers all required patterns."

      - name: No debug artifacts in repo
        run: |
          echo "=== Checking for debug/dev artifacts that should not be committed ==="
          FAIL=0

          # Database files
          DB_FILES=$(git ls-files '*.db' '*.sqlite' '*.sqlite3' 2>/dev/null || true)
          if [ -n "$DB_FILES" ]; then
            echo "FAIL: Database files in repo: $DB_FILES"
            FAIL=1
          fi

          # JSONL runtime artifacts
          JSONL_FILES=$(git ls-files 'artifacts/*.jsonl' '*.jsonl' 2>/dev/null || true)
          if [ -n "$JSONL_FILES" ]; then
            echo "FAIL: JSONL artifacts in repo: $JSONL_FILES"
            FAIL=1
          fi

          # Python sourcemaps / debug symbols
          PYC_FILES=$(git ls-files '*.pyc' '*.pyo' '*.pyd' 2>/dev/null || true)
          if [ -n "$PYC_FILES" ]; then
            echo "FAIL: Compiled Python files in repo: $PYC_FILES"
            FAIL=1
          fi

          # Coverage / profiling artifacts
          COV_FILES=$(git ls-files '.coverage' 'coverage.xml' 'htmlcov/*' '*.prof' 2>/dev/null || true)
          if [ -n "$COV_FILES" ]; then
            echo "FAIL: Coverage/profiling files in repo: $COV_FILES"
            FAIL=1
          fi

          # Sourcemap files (JS/CSS - should never appear)
          MAP_FILES=$(git ls-files '*.map' '*.js.map' '*.css.map' 2>/dev/null || true)
          if [ -n "$MAP_FILES" ]; then
            echo "FAIL: Sourcemap files in repo: $MAP_FILES"
            FAIL=1
          fi

          # Log files
          LOG_FILES=$(git ls-files '*.log' 'logs/*' 2>/dev/null || true)
          if [ -n "$LOG_FILES" ]; then
            echo "FAIL: Log files in repo: $LOG_FILES"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Debug artifacts detected in repository!"
            exit 1
          fi
          echo "OK: No debug artifacts found in tracked files."

      - name: pyproject.toml integrity
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate pyproject.toml and check for pinning
        run: |
          python3 - <<'PYEOF'
          import sys, tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          project = data.get("project", {})
          deps = project.get("dependencies", [])
          errors = []

          if not project.get("name"):
              errors.append("project.name is missing")
          if not project.get("version"):
              errors.append("project.version is missing")
          if not project.get("requires-python"):
              errors.append("project.requires-python is missing")
          if not deps:
              errors.append("project.dependencies is empty")

          # Check no dependency uses == (exact pin) without reason
          # Exact pins cause upgrade friction; prefer >= with upper bounds
          for dep in deps:
              if "==" in dep and ";" not in dep:
                  errors.append(f"Exact pin detected: {dep} (prefer >= with upper bound)")

          if errors:
              print("pyproject.toml issues:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print(f"OK: pyproject.toml valid ({len(deps)} dependencies, no exact pins)")
          PYEOF

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: mypy app/

  pr-check:
    name: PR Completeness Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check PR template fields filled
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 - <<'EOF'
          import os, sys
          body = os.environ.get("PR_BODY", "")
          required = [
              "Änderungsbericht",
              "Quality Gates",
              "Risiken",
              "Nächste TODOs",
              "Testbefehl",
          ]
          missing = [r for r in required if r not in body]
          if missing:
              print(f"❌ PR-Template unvollständig. Fehlende Abschnitte: {missing}")
              sys.exit(1)
          print("✅ PR-Template vollständig.")
          EOF
